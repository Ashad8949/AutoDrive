<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive AI — Car Assistant</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232563eb'/><text y='.9em' font-size='72' x='12'>🚗</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:    #2563eb;
            --blue-d:  #1d4ed8;
            --blue-l:  #dbeafe;
            --violet:  #7c3aed;
            --slate-9: #0f172a;
            --slate-8: #1e293b;
            --slate-7: #334155;
            --slate-6: #475569;
            --slate-4: #94a3b8;
            --slate-2: #e2e8f0;
            --slate-1: #f1f5f9;
            --slate-0: #f8fafc;
            --white:   #ffffff;
            --green:   #16a34a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--slate-9) 0%, #172554 50%, var(--slate-9) 100%);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Scrollbar ───────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

        /* ── Header ──────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: rgba(15,23,42,.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,.07);
        }
        .header-logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(37,99,235,.35);
        }
        .header-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
        .header-sub   { font-size: 12px; color: var(--slate-4); margin-top: 1px; }
        .header-badge {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 9999px;
            background: rgba(22,163,74,.12);
            border: 1px solid rgba(22,163,74,.25);
            color: #4ade80; font-size: 12px; font-weight: 600;
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

        /* ── Chat area ───────────────────────────────── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Welcome ─────────────────────────────────── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 48px 16px 32px;
            animation: fadeUp .5s ease;
        }
        .welcome-icon { font-size: 56px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .welcome h2 {
            font-size: 30px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .welcome p { color: var(--slate-4); font-size: 15px; line-height: 1.65; max-width: 420px; margin-bottom: 32px; }

        .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 580px; }
        .chip {
            padding: 8px 16px; border-radius: 9999px;
            background: rgba(37,99,235,.12); border: 1px solid rgba(37,99,235,.3);
            color: #93c5fd; font-size: 13px; cursor: pointer;
            transition: all .2s; font-family: inherit;
        }
        .chip:hover {
            background: rgba(37,99,235,.25); border-color: var(--blue); color: white;
            transform: translateY(-2px);
        }

        /* ── Messages ────────────────────────────────── */
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            animation: fadeUp .3s ease;
            align-items: flex-end;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 15px;
        }
        .message.bot  .avatar { background: linear-gradient(135deg, var(--blue), var(--violet)); }
        .message.user .avatar { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); }

        .bubble {
            max-width: 74%;
            padding: 12px 16px;
            font-size: 14px; line-height: 1.65;
            white-space: pre-wrap; word-break: break-word;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 18px 18px 4px 18px;
            color: white;
        }
        .message.bot .bubble {
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 18px 18px 18px 4px;
            color: var(--slate-1);
            backdrop-filter: blur(8px);
        }
        .message.bot .bubble strong { color: #93c5fd; }
        .message.bot .bubble ul, .message.bot .bubble ol { padding-left: 20px; margin: 8px 0; }
        .message.bot .bubble li { margin: 4px 0; }

        /* ── Typing dots ─────────────────────────────── */
        .typing { display: inline-flex; gap: 4px; padding: 2px 0; }
        .typing span {
            width: 7px; height: 7px; border-radius: 50%; background: var(--slate-4);
            animation: bounce 1.3s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-8px);opacity:1} }

        /* ── Booking widget ──────────────────────────── */
        .widget {
            margin-top: 12px;
            background: rgba(37,99,235,.1);
            border: 1px solid rgba(37,99,235,.3);
            border-radius: 14px; padding: 16px;
        }
        .widget-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .widget-btns  { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-primary {
            flex: 1; padding: 9px 14px; border-radius: 9px; border: none; cursor: pointer;
            background: var(--blue); color: white; font-weight: 600; font-size: 13px;
            font-family: inherit; transition: background .2s;
        }
        .btn-primary:hover { background: var(--blue-d); }
        .btn-secondary {
            padding: 9px 14px; border-radius: 9px; cursor: pointer;
            background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15);
            color: var(--slate-2); font-size: 13px; font-family: inherit; transition: background .2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,.12); }

        /* ── Input area ──────────────────────────────── */
        .input-area {
            padding: 14px 20px 20px;
            background: rgba(15,23,42,.8);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,.07);
        }
        .input-wrap {
            max-width: 780px; margin: 0 auto;
            display: flex; gap: 10px; align-items: flex-end;
        }
        textarea {
            flex: 1; padding: 12px 16px;
            background: rgba(255,255,255,.07);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 14px; color: white;
            font-family: inherit; font-size: 14px;
            resize: none; min-height: 48px; max-height: 120px;
            line-height: 1.5; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        textarea::placeholder { color: var(--slate-6); }
        textarea:focus {
            border-color: rgba(37,99,235,.6);
            box-shadow: 0 0 0 3px rgba(37,99,235,.15);
        }

        .mic-btn, .send-btn {
            width: 44px; height: 44px; border-radius: 12px; border: none;
            cursor: pointer; font-size: 17px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .mic-btn {
            background: rgba(255,255,255,.08);
            border: 1.5px solid rgba(255,255,255,.12);
            color: white;
        }
        .mic-btn:hover { background: rgba(255,255,255,.14); }
        .mic-btn.recording {
            background: rgba(239,68,68,.15);
            border-color: rgba(239,68,68,.5);
            animation: micPulse 1s ease-in-out infinite;
        }
        .mic-btn.transcribing { opacity: .5; cursor: not-allowed; }
        @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }

        .send-btn {
            background: linear-gradient(135deg, var(--blue), var(--violet));
            color: white;
            box-shadow: 0 4px 16px rgba(37,99,235,.35);
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 6px 20px rgba(37,99,235,.5); }
        .send-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

        .input-hint { text-align: center; font-size: 11px; color: var(--slate-6); margin-top: 8px; }

        /* Speaking badge */
        .speaking-badge {
            display: none; margin-left: auto;
            align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 9999px;
            background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3);
            color: #34d399; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .speaking-badge.active { display: flex; }

        @media (max-width: 640px) {
            .chat { padding: 16px 12px; }
            .input-area { padding: 10px 12px 16px; }
            .bubble { max-width: 85%; }
            .welcome h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="https://autodriveai.duckdns.org" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
        <div class="header-logo">🚗</div>
        <div>
            <div class="header-title">AutoDrive AI</div>
            <div class="header-sub">Your intelligent car shopping assistant</div>
        </div>
    </a>
    <div class="header-badge">
        <div class="dot"></div>
        Online
    </div>
    <button class="speaking-badge" id="speakingBadge" onclick="stopSpeaking()">
        🔊 Speaking — click to stop
    </button>
</header>

<main class="chat" id="chat">
    <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>How can I help you today?</h2>
        <p>I know everything about our car inventory. Ask me about pricing, features, comparisons, or book a test drive!</p>
        <div class="chips">
            <button class="chip" onclick="sendSuggestion(this)">SUVs under ₹20 lakh</button>
            <button class="chip" onclick="sendSuggestion(this)">Best electric cars?</button>
            <button class="chip" onclick="sendSuggestion(this)">Compare Creta vs Seltos</button>
            <button class="chip" onclick="sendSuggestion(this)">Most affordable hatchback</button>
            <button class="chip" onclick="sendSuggestion(this)">Diesel SUVs in Delhi</button>
            <button class="chip" onclick="sendSuggestion(this)">What's the best deal right now?</button>
        </div>
    </div>
</main>

<div class="input-area">
    <div class="input-wrap">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
        <textarea
            id="input"
            placeholder="Ask about any car, pricing, features…"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="resize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line · 🎤 click mic to speak</div>
</div>

<script>
const API  = '';
const SID  = 'session-' + Math.random().toString(36).slice(2, 10);
let streaming = false;

const chat      = document.getElementById('chat');
const input     = document.getElementById('input');
const sendBtn   = document.getElementById('sendBtn');
const welcome   = document.getElementById('welcome');
const micBtn    = document.getElementById('micBtn');
const speakBadge= document.getElementById('speakingBadge');

// ── Input helpers ─────────────────────────────────────────────────────
input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim() || streaming; });

function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function sendSuggestion(el) {
    input.value = el.textContent;
    send();
}

// ── Message rendering ─────────────────────────────────────────────────
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function fmt(t) {
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-size:13px">$1</code>');
    t = t.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
    t = t.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
    if (!t.startsWith('<')) t = '<p>' + t + '</p>';
    return t;
}

function addMsg(role, content) {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message ' + role;

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '🤖' : '👤';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    if (role === 'bot') bub.innerHTML = content ? fmt(content) : '<div class="typing"><span></span><span></span><span></span></div>';
    else bub.textContent = content;

    msg.appendChild(av);
    msg.appendChild(bub);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return bub;
}

// ── Send message ──────────────────────────────────────────────────────
async function send(text) {
    const msg = (text ?? input.value).trim();
    if (!msg || streaming) return;

    streaming = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';
    stopSpeaking();

    addMsg('user', msg);
    const bub = addMsg('bot', '');
    let full = '';

    try {
        const res = await fetch(API + '/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: SID, message: msg }),
        });

        const reader = res.body.getReader();
        const dec = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            for (const line of dec.decode(value, { stream: true }).split('\n')) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const d = JSON.parse(line.slice(6));
                    if (d.done) break;
                    if (d.error) { full += '\n⚠️ ' + d.error; bub.innerHTML = fmt(full); break; }
                    if (d.token) { full += d.token; bub.innerHTML = fmt(full); chat.scrollTop = chat.scrollHeight; }
                    if (d.action && d.action.startsWith('BOOK_TEST_DRIVE')) {
                        const carId = d.action.split(' ')[1] || 'this car';
                        bub.innerHTML += `
                        <div class="widget">
                            <div class="widget-title">📅 Book a Test Drive</div>
                            <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">Select a time for ${carId}:</p>
                            <div class="widget-btns">
                                <button class="btn-primary" onclick="sendSuggestion(this)">Tomorrow Morning</button>
                                <button class="btn-primary" onclick="sendSuggestion(this)">This Weekend</button>
                                <button class="btn-secondary" onclick="sendSuggestion(this)">Cancel</button>
                            </div>
                        </div>`;
                        chat.scrollTop = chat.scrollHeight;
                    }
                } catch {}
            }
        }
        if (full) speakText(full);
    } catch {
        bub.innerHTML = fmt('⚠️ Connection error. Make sure the server is running.');
    }

    streaming = false;
    sendBtn.disabled = !input.value.trim();
    input.focus();
}

// ── TTS ───────────────────────────────────────────────────────────────
function speakText(t) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = t.replace(/[*_`#]/g,'').replace(/\[(?:ACTION|CAR_ID):[^\]]+\]/g,'').replace(/<[^>]+>/g,'');
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.05;
    speakBadge.classList.add('active');
    u.onend = u.onerror = () => speakBadge.classList.remove('active');
    window.speechSynthesis.speak(u);
}
function stopSpeaking() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    speakBadge.classList.remove('active');
}

// ── Voice mic ─────────────────────────────────────────────────────────
let recorder = null, chunks = [], isRec = false;

async function toggleMic() {
    if (isRec) { recorder.stop(); return; }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            micBtn.textContent = '⏳';
            micBtn.className = 'mic-btn transcribing';
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const form = new FormData();
            form.append('audio', blob, 'audio.webm');
            try {
                const res = await fetch(API + '/voice/transcribe', { method: 'POST', body: form });
                const { transcript } = await res.json();
                if (transcript) { input.value = transcript; resize(input); send(transcript); }
            } catch { addMsg('bot', '⚠️ Could not transcribe. Please try again.'); }
            finally { micBtn.textContent = '🎤'; micBtn.className = 'mic-btn'; isRec = false; }
        };
        recorder.start();
        isRec = true;
        micBtn.textContent = '⏹';
        micBtn.className = 'mic-btn recording';
    } catch { alert('Microphone access denied. Please allow mic permission.'); }
}

input.focus();
</script>
</body>
</html>
